name: Backup Docker Image to R2

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Docker image name (e.g. mysql:8.0)"
        required: true
        default: "mysql:latest"

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Pull Docker image
      run: |
        docker pull ${{ github.event.inputs.image }}

    - name: Save + compress image
      run: |
        IMAGE_NAME=$(echo "${{ github.event.inputs.image }}" | tr '/' '_' | tr ':' '_')
        docker save ${{ github.event.inputs.image }} | gzip > ${IMAGE_NAME}.tar.gz
        echo "FILE=${IMAGE_NAME}.tar.gz" >> $GITHUB_ENV

    - name: Upload to R2
      run: |
        pip install boto3

        python3 << 'EOF'
        import boto3, os
        from datetime import datetime

        account_id = "${{ secrets.R2_ACCOUNT_ID }}"
        access_key = "${{ secrets.R2_ACCESS_KEY_ID }}"
        secret_key = "${{ secrets.R2_SECRET_ACCESS_KEY }}"
        bucket = "${{ secrets.R2_BUCKET_NAME }}"
        file_path = os.environ["FILE"]

        endpoint = f"https://{account_id}.r2.cloudflarestorage.com"

        s3 = boto3.client(
            "s3",
            endpoint_url=endpoint,
            aws_access_key_id=access_key,
            aws_secret_access_key=secret_key,
            region_name="auto"
        )

        timestamp = datetime.now().strftime("%Y%m%d_%H%M%S")
        object_key = f"docker/{timestamp}_{file_path}"

        print("Uploading:", file_path)
        s3.upload_file(file_path, bucket, object_key)
        print("Done:", object_key)
        EOF

    - name: Cleanup
      run: |
        rm -f *.tar.gz
