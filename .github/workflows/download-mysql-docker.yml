name: Download Docker Image

on:
  workflow_dispatch:

jobs:
  download-mysql:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Log in to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Pull Docker image
      run: docker pull mysql

    - name: Save Docker image to file
      run: docker save mysql -o ./mysql.tar

    - name: List files in the repository
      run: ls -lh ./mysql.tar

    - name: Upload to Cloudflare R2
      run: |
        pip install boto3
        python3 << 'EOF'
        import boto3
        import os
        from datetime import datetime
        
        # R2 configuration
        account_id = "${{ secrets.R2_ACCOUNT_ID }}"
        access_key = "${{ secrets.R2_ACCESS_KEY_ID }}"
        secret_key = "${{ secrets.R2_SECRET_ACCESS_KEY }}"
        bucket_name = "${{ secrets.R2_BUCKET_NAME }}"
        
        # Create S3 client for R2
        s3_client = boto3.client(
            's3',
            endpoint_url=f'https://{account_id}.r2.cloudflarestorage.com',
            aws_access_key_id=access_key,
            aws_secret_access_key=secret_key,
            region_name='auto'
        )
        
        # Upload file
        file_path = './mysql.tar'
        timestamp = datetime.now().strftime('%Y%m%d_%H%M%S')
        object_key = f'mysql_{timestamp}.tar'
        
        print(f'Uploading {file_path} to R2 as {object_key}...')
        s3_client.upload_file(file_path, bucket_name, object_key)
        print(f'Upload successful! File: {object_key}')
        EOF

    - name: Clean up local file
      run: rm -f ./mysql.tar
      
      env:
        R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
