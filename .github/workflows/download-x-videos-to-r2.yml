name: Download X Videos to R2

on:
  workflow_dispatch:
    inputs:
      usernames:
        description: "X usernames (comma-separated, without @)"
        required: true
        default: "91meidusha,T_Twife"
      max_videos:
        description: "Max items to scan per user (includes images and skipped)"
        required: false
        default: "200"
      date_after:
        description: "Only videos after this date (YYYYMMDD, inclusive)"
        required: false
      date_before:
        description: "Only videos before this date (YYYYMMDD, inclusive)"
        required: false
      include_retweets:
        description: "Include reposted (retweeted) videos"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  download:
    runs-on: ubuntu-latest

    env:
      USERNAMES: ${{ github.event.inputs.usernames }}
      MAX_VIDEOS: ${{ github.event.inputs.max_videos }}
      DATE_AFTER: ${{ github.event.inputs.date_after }}
      DATE_BEFORE: ${{ github.event.inputs.date_before }}
      INCLUDE_RETWEETS: ${{ github.event.inputs.include_retweets }}
      X_COOKIES: ${{ secrets.X_COOKIES }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: pip install gallery-dl boto3

    - name: Restore download archive from R2
      run: |
        python3 << 'EOF'
        import boto3, os

        s3 = boto3.client(
            "s3",
            endpoint_url=f"https://{os.environ['R2_ACCOUNT_ID']}.r2.cloudflarestorage.com",
            aws_access_key_id=os.environ["R2_ACCESS_KEY_ID"],
            aws_secret_access_key=os.environ["R2_SECRET_ACCESS_KEY"],
            region_name="auto"
        )
        bucket = os.environ["R2_BUCKET_NAME"]

        try:
            s3.download_file(bucket, "x-videos/.archive", "archive.txt")
            with open("archive.txt", "rb") as f:
                count = sum(1 for _ in f)
            print(f"Restored archive with {count} entries")
        except s3.exceptions.ClientError as e:
            if e.response["Error"]["Code"] == "404":
                print("No existing archive found, starting fresh")
                open("archive.txt", "w").close()
            else:
                raise
        EOF

    - name: Download videos
      run: |
        if [ -n "$X_COOKIES" ]; then
          echo "$X_COOKIES" > cookies.txt
          COOKIE_ARG="--cookies cookies.txt"
        else
          COOKIE_ARG=""
        fi

        FILTER=""
        if [ -n "$DATE_AFTER" ] && [ -n "$DATE_BEFORE" ]; then
          FILTER="--filter \"'$DATE_AFTER' <= date.strftime('%Y%m%d') <= '$DATE_BEFORE'\""
        elif [ -n "$DATE_AFTER" ]; then
          FILTER="--filter \"date.strftime('%Y%m%d') >= '$DATE_AFTER'\""
        elif [ -n "$DATE_BEFORE" ]; then
          FILTER="--filter \"date.strftime('%Y%m%d') <= '$DATE_BEFORE'\""
        fi

        IFS=',' read -ra USERS <<< "$USERNAMES"
        for RAW_USER in "${USERS[@]}"; do
          USER=$(echo "$RAW_USER" | tr -d ' ')
          echo "========== Downloading: @$USER =========="
          mkdir -p "downloads/$USER"

          # use timeline URL to include retweets, media-only URL otherwise
          if [ "$INCLUDE_RETWEETS" = "true" ]; then
            FETCH_URL="https://x.com/$USER"
          else
            FETCH_URL="https://x.com/$USER/media"
          fi

          eval gallery-dl \
            $COOKIE_ARG \
            $FILTER \
            --download-archive archive.txt \
            --range "1-$MAX_VIDEOS" \
            --sleep 2-10 \
            --directory "downloads/$USER" \
            --filename "{date:%Y%m%d}_{tweet_id}_{num}.{extension}" \
            "$FETCH_URL"

          echo "Files for @$USER:"
          ls -lh "downloads/$USER/" || echo "  No new files"
          sleep 10
        done

    - name: Upload videos and archive to R2
      run: |
        python3 << 'EOF'
        import boto3, os, glob

        s3 = boto3.client(
            "s3",
            endpoint_url=f"https://{os.environ['R2_ACCOUNT_ID']}.r2.cloudflarestorage.com",
            aws_access_key_id=os.environ["R2_ACCESS_KEY_ID"],
            aws_secret_access_key=os.environ["R2_SECRET_ACCESS_KEY"],
            region_name="auto"
        )
        bucket = os.environ["R2_BUCKET_NAME"]

        # Upload videos
        files = glob.glob("downloads/**/*.mp4", recursive=True) + \
                glob.glob("downloads/**/*.mkv", recursive=True)

        if files:
            for file_path in files:
                rel = os.path.relpath(file_path, "downloads")
                object_key = f"x-videos/{rel}"
                print(f"Uploading: {file_path} -> {object_key}")
                s3.upload_file(file_path, bucket, object_key)
            print(f"\nTotal uploaded: {len(files)} file(s)")
        else:
            print("No new video files to upload.")

        # Always save archive back to R2
        if os.path.exists("archive.txt"):
            s3.upload_file("archive.txt", bucket, "x-videos/.archive")
            with open("archive.txt", "rb") as f:
                count = sum(1 for _ in f)
            print(f"Archive saved ({count} total entries)")
        EOF

    - name: Cleanup
      if: always()
      run: rm -rf downloads/ cookies.txt archive.txt
