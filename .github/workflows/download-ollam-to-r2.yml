name: Download Ollama to Alibaba Cloud OSS

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "File URL to download"
        required: true
        default: "https://ollama.com/download/OllamaSetup.exe"
      target_path:
        description: "Target path in OSS bucket"
        required: true
        default: "ollama/"

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Download file
      run: |
        echo "Downloading: ${{ github.event.inputs.file_url }}"
        wget -O downloaded_file "${{ github.event.inputs.file_url }}"
        ls -lh downloaded_file
        echo "Download completed"

    - name: Set up Python environment
      run: |
        python3 -m venv env
        source env/bin/activate
        pip install oss2

    - name: Upload file to OSS
      run: |
        source env/bin/activate
        python3 << 'EOF'
        import oss2
        import os
        import urllib.parse

        # 阿里云 OSS 配置信息
        access_key_id = os.getenv('OSS_ACCESS_KEY_ID')
        access_key_secret = os.getenv('OSS_ACCESS_KEY_SECRET')
        bucket_name = 'bus-upload'
        endpoint = 'https://oss-cn-hangzhou.aliyuncs.com'
        file_url = os.getenv('FILE_URL')
        target_path = os.getenv('TARGET_PATH', '')
        
        # 验证必要的配置信息
        required = {
            'OSS_ACCESS_KEY_ID': access_key_id,
            'OSS_ACCESS_KEY_SECRET': access_key_secret,
            'FILE_URL': file_url,
        }
        missing = [name for name, value in required.items() if not value]
        if missing:
            raise ValueError(f"Missing required configuration: {', '.join(missing)}")
        
        # 初始化 OSS 配置
        auth = oss2.Auth(access_key_id, access_key_secret)
        bucket = oss2.Bucket(auth, endpoint, bucket_name)
        
        # 获取下载的文件信息
        file_path = 'downloaded_file'
        file_size = os.path.getsize(file_path)
        
        # 从 URL 中提取文件名
        parsed = urllib.parse.urlparse(file_url)
        filename = os.path.basename(parsed.path)
        if not filename or '.' not in filename:
            filename = "downloaded_file"
        
        if target_path and not target_path.endswith('/'):
            target_path = f'{target_path}/'
        object_name = f"{target_path}{filename}"
        
        print(f"Uploading: {file_path} ({file_size} bytes) -> {object_name}")
        print(f"OSS Endpoint: {endpoint}")
        
        # 上传文件到 OSS
        bucket.put_object_from_file(object_name, file_path)
        print(f"Successfully uploaded to Alibaba Cloud OSS: {object_name}")
        EOF
      env:
        OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
        OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        FILE_URL: ${{ github.event.inputs.file_url }}
        TARGET_PATH: ${{ github.event.inputs.target_path }}

    - name: Cleanup
      if: always()
      run: rm -f downloaded_file
