name: Download Ollama to Alibaba Cloud OSS

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "File URL to download"
        required: true
        default: "https://ollama.com/download/OllamaSetup.exe"
      target_path:
        description: "Target path in OSS bucket"
        required: true
        default: "ollama/"

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download file
      run: |
        echo "Downloading: ${{ github.event.inputs.file_url }}"
        wget -O downloaded_file "${{ github.event.inputs.file_url }}"
        ls -lh downloaded_file
        echo "Download completed"

    - name: Set up Python environment
      run: |
        python3 -m venv env
        source env/bin/activate
        pip install oss2

    - name: Upload file to OSS
      run: |
        source env/bin/activate
        python3 << 'EOF'
        import oss2
        import os
        import urllib.parse

        # 阿里云 OSS 配置信息
        access_key_id = os.getenv('OSS_ACCESS_KEY_ID')
        access_key_secret = os.getenv('OSS_ACCESS_KEY_SECRET')
        bucket_name = os.getenv('OSS_BUCKET_NAME')
        endpoint = os.getenv('OSS_ENDPOINT')
        
        # 初始化 OSS 配置
        auth = oss2.Auth(access_key_id, access_key_secret)
        bucket = oss2.Bucket(auth, f'https://{endpoint}', bucket_name)
        
        # 获取下载的文件信息
        file_path = 'downloaded_file'
        file_size = os.path.getsize(file_path)
        
        # 从 URL 中提取文件名
        file_url = "${{ github.event.inputs.file_url }}"
        parsed = urllib.parse.urlparse(file_url)
        filename = os.path.basename(parsed.path)
        if not filename or '.' not in filename:
            filename = "downloaded_file"
        
        target_path = "${{ github.event.inputs.target_path }}"
        object_name = f"{target_path}{filename}"
        
        print(f"Uploading: {file_path} ({file_size} bytes) -> {object_name}")
        
        # 上传文件到 OSS
        bucket.put_object_from_file(object_name, file_path)
        print(f"Successfully uploaded to Alibaba Cloud OSS: {object_name}")
        EOF
      env:
        OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
        OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        OSS_BUCKET_NAME: ${{ secrets.OSS_BUCKET_NAME }}
        OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}

    - name: Cleanup
      if: always()
      run: rm -f downloaded_file
